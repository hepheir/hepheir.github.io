# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Today I Learned
email: hepheir@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  자기 개발 및 취미 일상 블로그입니다
baseurl: "" # the subpath of your site, e.g. /blog
url: https://hepheir.github.io # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: null
github_username: Hepheir

# Build settings
remote_theme: Hepheir/jekyll-minimal-mistakes-refactored@develop
plugins:
  - jekyll-feed
  - jekyll-include-cache

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Minimal Mistakes Settings
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"
title_separator: "::"
subtitle: "기록으로 남기는 공부 블로그" # site tagline that appears below site title in masthead

defaults:
  - scope:
      path: ""
    values:
      sidebar: true
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      read_time: true
      comments: # true
      share: true
      related: true

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Hepheir"

comments:
  provider: utterances
  utterances:
    theme: github-light # "github-light" (default), "github-dark"
    issue_term: pathname # "pathname" (default)
    repository: Hepheir/hepheir.github.io

search: true # true, false (default)
search_full_content: true # true, false (default)
search_provider: google
google:
  search_engine_id: 0f64ffd396fea8281 # YOUR_SEARCH_ENGINE_ID
  instant_search: true # false (default), true

analytics:
  provider: "google-gtag" # false (default), "google", "google-universal", "google-gtag", "custom"
  google:
    tracking_id: "G-WZ5XL7PJ98"
    anonymize_ip: false # true, false (default)

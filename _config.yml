# ==============================================================================
# Jekyll Configuration
# https://jekyllrb.com/docs/configuration/default/
# ==============================================================================
# Where things are
collections_dir: docs
collections:
  education:
    output: true
  project:
    output: true

# Handling Reading
strict_front_matter: false

# Filtering Content
show_drafts: false
future: true
unpublished: false

# Outputting
timezone: Asia/Seoul
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "asset"
    values:
      layout: script

# Markdown Processors
kramdown:
  show_warnings: true
  math_engine: mathjax

# ==============================================================================
# Theme Configuration
# ==============================================================================
theme: just-the-docs

url: https://hepheir.github.io

title: Hepheir
description: Devlog of Hepheir@gmail.com

# Set a path/url to a logo that will be displayed instead of the title
# logo: https://www.gravatar.com/avatar/38ad7d544cb4329679a67e6008cf9c69

# Aux links for the upper right navigation
aux_links:
  "Hepheir on GitHub":
    - "//github.com/Hepheir"

# External navigation links
nav_external_links:
  - title: Instagram
    url: https://instagram.com/hepxheir
  - title: GitHub Profile
    url: https://github.com/Hepheir


just_the_docs:
  # Define which collections are used in just-the-docs
  collections:
    # test:
      # Give the collection a name
      # name: Test

      # Exclude the collection from the navigation
      # Supports true or false (default)
      # nav_exclude: true

      # Fold the collection in the navigation
      # Supports true or false (default)
      # nav_fold: true  # note: this option is new in v0.4

      # Exclude the collection from the search
      # Supports true or false (default)
      # search_exclude: true
    education:
      name: Education
      # nav_fold: true

    project:
      name: Project

# Enable or disable heading anchors
heading_anchors: true

# For copy button on code
enable_copy_code_button: true

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

mermaid:
  # Version of mermaid library
  # Pick an available version from https://cdn.jsdelivr.net/npm/mermaid/
  version: "9.3.0"

# Footer "Edit this page on GitHub" link text
gh_edit_link: false # show or hide edit this page link
gh_edit_link_text: "Edit this page on GitHub."
gh_edit_repository: "https://github.com/Hepheir/hepheir.github.io-posts" # the github URL for your repo
gh_edit_branch: "main" # the branch that your docs is served from
# gh_edit_source: docs # the source that your files originate from
gh_edit_view_mode: "tree" # "tree" or "edit" if you want the user to jump into the editor immediately

# Google Analytics Tracking (optional)
# Supports a CSV of tracking ID strings (eg. "UA-1234567-89,G-1AB234CDE5")
ga_tracking: G-WZ5XL7PJ98
ga_tracking_anonymize_ip: false # Use GDPR compliant Google Analytics settings (true/nil by default)

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false
  # ignore:
  #   envs: all
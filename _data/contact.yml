#  The contact options.

-
  type: github
  icon: 'fab fa-github'
-
  type: instagram
  icon: 'fab fa-instagram'
  url:  'https://www.instagram.com/hepxheir/'
-
  type: email
  icon: 'fas fa-envelope'
  noblank: true
-
  type: rss
  icon: 'fas fa-rss'
  noblank: true

# Supported Types
# to see further more, read: https://github.com/cotes2020/jekyll-theme-chirpy/blob/master/_includes/sidebar.html#L66
# - `fa-brands` -> `fab`
# - `fa-solid` -> `fas`
